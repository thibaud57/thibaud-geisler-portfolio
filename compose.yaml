services:
  nextjs:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_CALENDLY_URL_FR: ${NEXT_PUBLIC_CALENDLY_URL_FR}
        NEXT_PUBLIC_CALENDLY_URL_EN: ${NEXT_PUBLIC_CALENDLY_URL_EN}
    restart: unless-stopped
    env_file: .env
    environment:
      ASSETS_PATH: /app/assets
    volumes:
      - portfolio_assets:/app/assets

volumes:
  portfolio_assets:
