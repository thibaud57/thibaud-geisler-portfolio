version: 2

updates:
  - package-ecosystem: npm
    directory: /
    target-branch: develop
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /
    target-branch: develop
    schedule:
      interval: monthly
