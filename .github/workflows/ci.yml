name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            source:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!.claude/**'

  quality:
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v6

      - name: Create .env for just (dotenv-required)
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://test:test@localhost:5432/test_db
          NEXT_PUBLIC_SITE_URL=http://localhost:3000
          SMTP_HOST=smtp.test.local
          SMTP_PORT=587
          SMTP_USER=ci@test.local
          SMTP_PASS=ci-dummy
          SMTP_FROM=ci@test.local
          MAIL_TO=ci@test.local
          EOF

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - uses: extractions/setup-just@v4

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.{js,jsx,ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Apply Prisma migrations to test DB
        run: pnpm prisma migrate deploy

      - run: just lint
      - run: just typecheck
      - run: just test
      - run: just build

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

  ci:
    needs: [changes, quality]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Verify
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "Changes detection job did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          if [[ "${{ needs.quality.result }}" == "failure" || "${{ needs.quality.result }}" == "cancelled" ]]; then
            echo "Quality job failed or cancelled"
            exit 1
          fi
          echo "CI OK (quality passed or doc-only skip)"
